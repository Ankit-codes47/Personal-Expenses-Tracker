<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login | Expense Tracker
    </title>


    <link
        rel="stylesheet"
        href="../CSS/style.css"
    >

</head>


<body>


    <main class="login-page">


        <section class="login-card">


            <div class="logo">

                ₹

            </div>


            <h1>

                Expense Tracker

            </h1>


            <p class="tagline">

                Take Control of Your Money,
                One Expense at a Time.

            </p>



            <!-- LOGIN FORM -->

            <form id="loginForm">


                <div class="input-group">


                    <label for="email">

                        Email Address

                    </label>


                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >


                </div>



                <div class="input-group">


                    <label for="password">

                        Password

                    </label>


                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >


                </div>



                <button
                    type="submit"
                    id="loginButton"
                    class="login-btn"
                >

                    Login

                </button>


            </form>



            <!-- DIVIDER -->

            <div class="divider">

                <span>

                    OR

                </span>

            </div>



            <!-- GOOGLE LOGIN -->

            <button
                type="button"
                id="googleLogin"
                class="google-btn"
            >

                Continue with Google

            </button>



            <!-- MESSAGE -->

            <p
                id="message"
                class="message"
            ></p>


        </section>


    </main>



    <script
        type="module"
        src="../JS/auth.js"
    ></script>


</body>

</html>
